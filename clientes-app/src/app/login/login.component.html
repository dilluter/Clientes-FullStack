<div id="layoutAuthentication">
  <div id="layoutAuthentication_content">
    <main>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg mt-5">
              <div class="card-header">
                <h3 class="text-center font-weight-light my-4">
                  {{ cadastrando ? 'Cadastro de Novo Usuário' : 'Bem-vindo(a)' }}
                </h3>
              </div>
              <div class="card-body">
                <div class="alert alert-danger" *ngIf="loginError">
                  Login e/ou Senha incorreto(a).
                </div>
                <form #loginForm="ngForm" (ngSubmit)="cadastrando ? onCadastrar() : onSubmit()">
                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1">Nome Completo</label>
                    <input type="text" name="nomeCompleto" [(ngModel)]="nomeCompleto"
                           class="form-control py-4" placeholder="Seu nome completo" required />
                  </div>
                  <div class="form-group mb-3">
                    <label class="small mb-1">Login</label>
                    <input type="text" name="username" [(ngModel)]="username"
                           class="form-control py-4" placeholder="Digite seu login" required />
                  </div>
                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1">Email</label>
                    <input type="email" name="email" [(ngModel)]="email"
                           class="form-control py-4" placeholder="Seu email" required />
                  </div>
                  <div class="form-group mb-3">
                    <label class="small mb-1">Senha</label>
                    <input type="password" name="password" [(ngModel)]="password"
                           class="form-control py-4" placeholder="Digite sua senha" required />
                  </div>
                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1">Telefone</label>
                    <input type="text" name="telefone" [(ngModel)]="telefone"
                           class="form-control py-4" placeholder="Ex: 11999999999" />
                  </div>
                  <div class="form-group d-flex align-items-center mt-4 mb-0 gap-2">
                    <button type="submit" class="btn btn-primary" *ngIf="!cadastrando">
                      Entrar
                    </button>
                    <ng-container *ngIf="cadastrando">
                      <button type="submit" class="btn btn-success">Cadastrar</button>
                      <button type="button" (click)="cancelarCadastrar()" class="btn btn-danger ms-2">
                        Cancelar
                      </button>
                    </ng-container>
                  </div>
                </form>
              </div>
              <div class="card-footer text-center">
                <div class="small">
                  <a href="#" (click)="preparaCadastrar($event)" *ngIf="!cadastrando">
                    Não possui usuário? Cadastre-se
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
