<div id="layoutAuthentication">
  <div id="layoutAuthentication_content">
    <main>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-5">

            <div class="card shadow-lg border-0 rounded-lg mt-5">

              <div class="card-header">
                <h3 class="text-center font-weight-light my-4">
                  {{ cadastrando ? 'Cadastro de Novo Usuário' : 'Bem-vindo(a)' }}
                </h3>
              </div>

              <div class="card-body">

                <div class="alert alert-success" *ngIf="cadastroSuccess">
                  Cadastro realizado com sucesso. Faça o login.
                </div>

                <div class="alert alert-danger" *ngIf="loginError">
                  Login e/ou senha incorreto(a).
                </div>

                <div class="alert alert-danger" *ngIf="errors.length > 0">
                  <div *ngFor="let error of errors">{{ error }}</div>
                </div>

                <form #loginForm="ngForm" (ngSubmit)="cadastrando ? onCadastrar() : onSubmit()">

                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1" for="nomeCompleto">Nome Completo</label>
                    <input
                      id="nomeCompleto"
                      type="text"
                      name="nomeCompleto"
                      [(ngModel)]="nomeCompleto"
                      class="form-control py-4"
                      placeholder="Seu nome completo"
                      required>
                  </div>

                  <div class="form-group mb-3">
                    <label class="small mb-1" for="username">Login</label>
                    <input
                      id="username"
                      type="text"
                      name="username"
                      [(ngModel)]="username"
                      class="form-control py-4"
                      placeholder="Digite seu login"
                      required>
                  </div>

                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1" for="email">Email</label>
                    <input
                      id="email"
                      type="email"
                      name="email"
                      [(ngModel)]="email"
                      class="form-control py-4"
                      placeholder="Seu email"
                      required>
                  </div>

                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1" for="confirmarEmail">Confirmar Email</label>
                    <input
                      id="confirmarEmail"
                      type="email"
                      name="confirmarEmail"
                      [(ngModel)]="confirmarEmail"
                      class="form-control py-4"
                      placeholder="Confirme seu email"
                      required>
                  </div>

                  <div class="text-danger small mb-3" *ngIf="emailsDiferentes()">
                    Os emails informados não conferem.
                  </div>

                  <div class="form-group mb-3">
                    <label class="small mb-1" for="password">Senha</label>
                    <input
                      id="password"
                      type="password"
                      name="password"
                      [(ngModel)]="password"
                      class="form-control py-4"
                      placeholder="Digite sua senha"
                      required
                      minlength="6">
                  </div>

                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1" for="confirmarPassword">Confirmar Senha</label>
                    <input
                      id="confirmarPassword"
                      type="password"
                      name="confirmarPassword"
                      [(ngModel)]="confirmarPassword"
                      class="form-control py-4"
                      placeholder="Confirme sua senha"
                      required
                      minlength="6">
                  </div>

                  <div class="text-danger small mb-3" *ngIf="senhasDiferentes()">
                    As senhas informadas não conferem.
                  </div>

                  <div class="form-group mb-3" *ngIf="cadastrando">
                    <label class="small mb-1" for="telefone">Telefone</label>
                    <input
                      id="telefone"
                      type="text"
                      name="telefone"
                      [(ngModel)]="telefone"
                      class="form-control py-4"
                      placeholder="Ex: (61) 99999-9999"
                      maxlength="15"
                      (input)="onTelefoneChange($event)">
                  </div>

                  <div class="form-group d-flex align-items-center mt-4 mb-0 gap-2">
                    <button
                      type="submit"
                      class="btn btn-primary"
                      [disabled]="loginForm.invalid"
                      *ngIf="!cadastrando">
                      Entrar
                    </button>

                    <ng-container *ngIf="cadastrando">
                      <button
                        type="submit"
                        class="btn btn-success"
                        [disabled]="loginForm.invalid || formularioCadastroInvalido()">
                        Cadastrar
                      </button>

                      <button
                        type="button"
                        (click)="cancelarCadastrar()"
                        class="btn btn-danger ms-2">
                        Cancelar
                      </button>
                    </ng-container>
                  </div>

                </form>
              </div>

              <div class="card-footer text-center" *ngIf="!cadastrando">
                <div class="small">
                  <a href="#" (click)="preparaCadastrar($event)">
                    Não possui usuário? Cadastre-se
                  </a>
                </div>
              </div>

            </div>

          </div>
        </div>
      </div>
    </main>
  </div>
</div>
