<div id="layoutAuthentication">
  <div id="layoutAuthentication_content">
    <main>
      <div class="container">
        <div class="row justify-content-center" >
          <div class="col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg mt-5">
              <div class="card-header">
                <h3 class="text-center font-weight-light my-4">{{cadastrando ? 'Cadastro de Novo Usuário' : 'bem-vindo(a)'}}</h3>
              </div>
              <div class="card-body">
                <div class="alert alert-danger" *ngIf="loginError">Login e/ou Senha incorreto(a).</div>
                <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
                 <div class="form-group">
                   <label class="small mb-1">Login</label>
                   <input type="text" name="username" [(ngModel)]="username" class="form-control py-4" placeholder="Digite seu login" />
                 </div>
                  <div class="form-group">
                    <label class="small mb-1">Senha</label>
                    <input type="text" name="password" [(ngModel)]="password" class="form-control py-4" placeholder="Digite sua senha" />
                  </div>
                  <div class="form-group d-flex align-items-center mt-4 mb-0 gap-2">
                    <button type="submit" class="btn btn-primary" *ngIf="!cadastrando">Entrar</button>
                    <ng-container *ngIf="cadastrando">
                      <button type="button" class="btn btn-primary">Cadastrar</button>
                      <button type="button" (click)="cancelarCadastrar()" class="btn btn-danger ms-2">Cancelar</button>
                    </ng-container>
                  </div>
                </form>
              </div>
              <div class="card-footer text-center">
                <div class="small">
                  <a href="#" (click)="preparaCadastrar($event)" *ngIf="!cadastrando">Não possui Usuario? Cadastre-se</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
