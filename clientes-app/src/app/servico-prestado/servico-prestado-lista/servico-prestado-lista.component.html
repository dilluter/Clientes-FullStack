<h1 class="mt-4 mb-3">Serviço Prestado</h1>
<ol class="breadcrumb mb-4">
  <li class="breadcrumb-item active">Consultar</li>
</ol>
<div class="container">
  <form #consultaForm="ngForm" (ngSubmit)="consultar()">
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label for="inputNome">Nome Cliente:</label>
          <input type="text" [(ngModel)]="nome"
             name="nome" class="form-control"
             id="inputNome" placeholder="Digite o nome do cliente">
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group"><label for="inputMes">Mês:</label>
          <select class="form-control" [(ngModel)]="mes" name="mes" id="inputMes">
            <option [ngValue]="null">Selecione...</option>
            <option *ngFor="let m of meses" [ngValue]="m">{{ m }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-md-12">
        <button type="submit" class="btn btn-primary">
          <i class="fa fa-search"></i> Consultar
        </button>
        <button type="button" class="btn btn-warning ml-2" routerLink="/servico-prestado/form"><i class="fa fa-plus"></i> Novo
        </button>
      </div>
    </div>
  </form>

  <br/>
  <div class="row">
    <div class="alert alert-warning" *ngIf="message">
      {{ message }}
    </div>
    <div class="col-md-12">
      <table class="table table-striped table-hover mt-4" *ngIf="lista.length > 0">
        <thead>
        <tr>
          <th>Cliente</th>
          <th>Descrição</th>
          <th>Preço</th>
          <th>Data</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let s of lista">
          <td>{{ s.cliente.nome }}</td>
          <td>{{ s.descricao }}</td>
          <td>{{ s.valor }}</td>
          <td>{{ s.data }}</td>
        </tr>
        </tbody>
      </table>
    </div>
    </div>
  </div>
