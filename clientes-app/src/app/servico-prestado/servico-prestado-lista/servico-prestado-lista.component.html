<h1 class="mt-4 mb-3">Serviço Prestado</h1>

<ol class="breadcrumb mb-4">
  <li class="breadcrumb-item">
    <a routerLink="/home">Home</a>
  </li>
  <li class="breadcrumb-item active">Consultar</li>
</ol>

<div class="container">

  <form #consultaForm="ngForm" (ngSubmit)="consultar()">

    <div class="row">

      <div class="col-md-6">
        <div class="form-group">
          <label for="inputNome">Nome Cliente:</label>
          <input
            type="text"
            [(ngModel)]="nome"
            name="nome"
            class="form-control"
            id="inputNome"
            placeholder="Digite o nome do cliente">
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group">
          <label for="inputMes">Mês:</label>
          <select
            class="form-control"
            [(ngModel)]="mes"
            name="mes"
            id="inputMes">
            <option [ngValue]="undefined">Selecione...</option>
            <option *ngFor="let m of meses" [ngValue]="m">{{ m }}</option>
          </select>
        </div>
      </div>

    </div>

    <div class="row mt-3">
      <div class="col-md-12">

        <button type="submit" class="btn btn-primary">
          <i class="fa fa-search"></i> Consultar
        </button>

        <button
          type="button"
          class="btn btn-secondary ml-2"
          (click)="limparFiltros()">
          Limpar
        </button>

        <button
          type="button"
          class="btn btn-warning ml-2"
          routerLink="/servico-prestado/form">
          <i class="fa fa-plus"></i> Novo
        </button>

      </div>
    </div>

  </form>

  <br>

  <div class="alert alert-warning" *ngIf="message">
    {{ message }}
  </div>

  <div class="alert alert-danger" *ngIf="errors.length > 0">
    <div *ngFor="let error of errors">{{ error }}</div>
  </div>

  <div class="row" *ngIf="possuiResultados">
    <div class="col-md-12">

      <table class="table table-striped table-hover mt-4">
        <thead>
        <tr>
          <th>Cliente</th>
          <th>Descrição</th>
          <th>Preço</th>
          <th>Data</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let servico of lista">
          <td>{{ servico.nomeCliente }}</td>
          <td>{{ servico.descricao }}</td>
          <td>{{ servico.valor | currency:'BRL' }}</td>
          <td>{{ servico.data }}</td>
        </tr>
        </tbody>
      </table>

      <div class="d-flex justify-content-between align-items-center mt-3" *ngIf="totalPaginas > 0">
        <small class="text-muted">
          Total de registros: {{ totalElementos }}
        </small>

        <div>
          <button
            type="button"
            class="btn btn-outline-secondary btn-sm"
            [disabled]="paginaAtual === 0"
            (click)="paginaAnterior()">
            Anterior
          </button>

          <span class="mx-2">
            Página {{ paginaAtual + 1 }} de {{ totalPaginas }}
          </span>

          <button
            type="button"
            class="btn btn-outline-secondary btn-sm"
            [disabled]="paginaAtual + 1 >= totalPaginas"
            (click)="proximaPagina()">
            Próxima
          </button>
        </div>
      </div>

    </div>
  </div>

</div>
