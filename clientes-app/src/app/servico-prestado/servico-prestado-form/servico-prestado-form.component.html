<h1 class="mt-4 mb-3">Serviço Prestado</h1>

<ol class="breadcrumb mb-4">
  <li class="breadcrumb-item">
    <a routerLink="/home">Home</a>
  </li>
  <li class="breadcrumb-item">
    <a routerLink="/servico-prestado/lista">Serviços Prestados</a>
  </li>
  <li class="breadcrumb-item active">Novo</li>
</ol>

<div class="container">
  <form #form="ngForm" (ngSubmit)="onSubmit()">

    <div class="row mb-3" *ngIf="success || errors.length > 0">
      <div class="col-12">
        <div class="alert alert-success" *ngIf="success">
          Serviço salvo com sucesso!
        </div>

        <div class="alert alert-danger" *ngFor="let erro of errors">
          {{ erro }}
        </div>
      </div>
    </div>

    <div class="row">

      <div class="col-md-4">
        <div class="form-group">
          <label for="data">Data</label>
          <input
            id="data"
            type="text"
            class="form-control"
            name="data"
            placeholder="dd/MM/yyyy"
            maxlength="10"
            required
            [(ngModel)]="dataFormatada"
            (input)="onDataChange($event)">
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label for="cliente">Cliente</label>
          <select
            id="cliente"
            class="form-control"
            name="idCliente"
            required
            [(ngModel)]="servicoPrest.idCliente">
            <option [ngValue]="undefined">Selecione...</option>
            <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">
              {{ cliente.nome }}
            </option>
          </select>
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label for="valor">Valor</label>
          <input
            id="valor"
            type="number"
            class="form-control"
            name="valor"
            required
            min="0"
            step="0.01"
            [(ngModel)]="servicoPrest.valor">
        </div>
      </div>

    </div>

    <div class="row mt-3">
      <div class="col-md-12">
        <div class="form-group">
          <label for="descricao">Descrição</label>
          <input
            id="descricao"
            type="text"
            class="form-control"
            name="descricao"
            required
            maxlength="150"
            [(ngModel)]="servicoPrest.descricao">
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-md-12">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="form.invalid">
          <i class="fa fa-save"></i> Salvar
        </button>

        <button
          type="button"
          class="btn btn-danger ml-2"
          routerLink="/servico-prestado/lista">
          <i class="fa fa-arrow-left"></i> Voltar
        </button>
      </div>
    </div>

  </form>
</div>
