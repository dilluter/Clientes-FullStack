<h1 class="mt-4">Serviço Prestado</h1>

<ol class="breadcrumb mb-4">
  <li class="breadcrumb-bitem active">Novo</li>
</ol>

<div class="container">
  <form #form="ngForm" (submit)="onSubmit()">
    <div class="row">
      <div class="col-md-12">
        <div class="form-group">
          <label>Descrição</label>
          <input type="text"
                 class="form-control"
                 name="descricao"
                 [(ngModel)]="servicoPrest.descricao">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4">
        <div class="form-group">
          <label>Data</label>
          <input type="text"
                 class="form-control"
                 name="data"
                 [(ngModel)]="servicoPrest.data">
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label>Cliente</label>
          <select class="form-control"
                  [ngModelOptions]="{standalone: true}"
                  [(ngModel)]="servicoPrest.idCliente">
            <option value="">Selecione...</option>
            <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">
              {{ cliente.nome }}
            </option>
          </select>
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label>Valor</label>
          <input type="text"
                 class="form-control"
                 name="valor"
                 [(ngModel)]="servicoPrest.valor">
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-md-3">
        <button type="submit" class="btn btn-primary">
          Salvar
        </button>
      </div>
    </div>
  </form>
</div>
