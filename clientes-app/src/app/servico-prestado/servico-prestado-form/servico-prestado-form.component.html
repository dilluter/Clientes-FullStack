<div class="container-fluid mt-3">

  <nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-4">
      <li class="breadcrumb-item">
        <a routerLink="/home">Home</a>
      </li>
      <li class="breadcrumb-item">
        <a routerLink="/servico-prestado/lista">Serviços Prestados</a>
      </li>
      <li class="breadcrumb-item active">Novo</li>
    </ol>
  </nav>

  <form #form="ngForm" (ngSubmit)="onSubmit()">

    <div class="card shadow-sm">

      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
          <i class="fa fa-handshake"></i> Cadastro de Serviço Prestado
        </h5>

        <button
          type="button"
          class="btn btn-outline-secondary btn-sm"
          routerLink="/servico-prestado/lista">
          Voltar
        </button>
      </div>

      <div class="card-body">

        <div class="row mb-3" *ngIf="success || errors.length > 0">
          <div class="col-12">
            <div class="alert alert-success" *ngIf="success">
              Serviço salvo com sucesso!
            </div>

            <div class="alert alert-danger" *ngFor="let erro of errors">
              {{ erro }}
            </div>
          </div>
        </div>

        <div class="row">

          <div class="col-md-4 mb-3">
            <label for="data" class="form-label">Data</label>
            <input
              id="data"
              type="text"
              class="form-control"
              name="data"
              placeholder="dd/MM/yyyy"
              maxlength="10"
              required
              [(ngModel)]="dataFormatada"
              (input)="onDataChange($event)">
          </div>

          <div class="col-md-4 mb-3">
            <label for="cliente" class="form-label">Cliente</label>
            <select
              id="cliente"
              class="form-control"
              name="idCliente"
              required
              [(ngModel)]="servicoPrest.idCliente">
              <option [ngValue]="undefined">Selecione...</option>
              <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">
                {{ cliente.nome }}
              </option>
            </select>
          </div>

          <div class="col-md-4 mb-3">
            <label for="valor" class="form-label">Valor</label>
            <input
              id="valor"
              type="number"
              class="form-control"
              name="valor"
              required
              min="0"
              step="0.01"
              placeholder="0,00"
              [(ngModel)]="servicoPrest.valor">
          </div>

        </div>

        <div class="row">

          <div class="col-md-12 mb-3">
            <label for="descricao" class="form-label">Descrição</label>
            <input
              id="descricao"
              type="text"
              class="form-control"
              name="descricao"
              required
              maxlength="150"
              placeholder="Descrição do serviço prestado"
              [(ngModel)]="servicoPrest.descricao">
          </div>

        </div>

        <div class="d-flex gap-2 mt-3">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="form.invalid">
            <i class="fa fa-save"></i> Salvar
          </button>

          <button
            type="button"
            class="btn btn-danger"
            routerLink="/servico-prestado/lista">
            Cancelar
          </button>
        </div>

      </div>
    </div>

  </form>
</div>
