<div class="container-fluid mt-3">

  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a routerLink="/home">Home</a>
      </li>
      <li class="breadcrumb-item">
        <a routerLink="/clientes/lista">Clientes</a>
      </li>
      <li class="breadcrumb-item active">
        {{ cliente.id ? 'Edição' : 'Cadastro' }}
      </li>
    </ol>
  </nav>

  <form #clienteForm="ngForm" (ngSubmit)="onSubmit()">

    <div class="card shadow-sm">

      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
          <i class="fa fa-user"></i>
          {{ cliente.id ? 'Edição de Cliente' : 'Cadastro de Cliente' }}
        </h5>

        <button
          type="button"
          class="btn btn-outline-secondary btn-sm"
          (click)="voltar()">
          Voltar
        </button>
      </div>

      <div class="card-body">

        <div class="row mb-3" *ngIf="success || errors.length > 0">
          <div class="col-12">
            <div class="alert alert-success" *ngIf="success">
              Cliente salvo/atualizado com sucesso!
            </div>

            <div class="alert alert-danger" *ngFor="let erro of errors">
              {{ erro }}
            </div>
          </div>
        </div>

        <div class="row" *ngIf="cliente.id">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="id">ID</label>
            <input
              id="id"
              type="text"
              class="form-control"
              [ngModel]="cliente.id"
              name="id"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="dataDeCadastro">Data de Cadastro</label>
            <input
              id="dataDeCadastro"
              type="text"
              class="form-control"
              [ngModel]="cliente.dataDeCadastro"
              name="dataDeCadastro"
              disabled>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="nome">Nome</label>
            <input
              id="nome"
              type="text"
              class="form-control"
              placeholder="Nome completo"
              name="nome"
              required
              maxlength="150"
              [(ngModel)]="cliente.nome">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="cpf">CPF</label>
            <input
              id="cpf"
              type="text"
              class="form-control"
              placeholder="000.000.000-00"
              maxlength="14"
              name="cpf"
              required
              [(ngModel)]="cliente.cpf"
              (input)="onCpfChange($event)">
          </div>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button
            type="submit"
            class="btn btn-success"
            [disabled]="clienteForm.invalid"
            *ngIf="!cliente.id">
            Salvar
          </button>

          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="clienteForm.invalid"
            *ngIf="cliente.id">
            Atualizar
          </button>

          <button
            type="button"
            class="btn btn-danger"
            (click)="voltar()">
            Cancelar
          </button>
        </div>

      </div>
    </div>
  </form>
</div>
